# Alembic configuration for LIPSA
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The SQLAlchemy URL is constructed dynamically in env.py
# so we do not hardcode it here (respects ~/.lipsa/lipsa.db + WAL settings).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
